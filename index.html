<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PPT Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PptxGenJS/3.12.0/pptxgen.bundled.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f0e1a;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 16px}
h1{font-size:22px;font-weight:700;color:#a78bfa;margin-bottom:8px;text-align:center}
p{font-size:13px;color:#9ca3af;margin-bottom:28px;text-align:center}
.btn{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;border:none;padding:14px 36px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:opacity .2s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.5;cursor:not-allowed}
.status{margin-top:18px;font-size:13px;color:#6ee7b7;min-height:20px;text-align:center}
.preview{display:grid;grid-template-columns:repeat(4,80px);gap:8px;margin:24px 0}
.slide-thumb{width:80px;height:52px;border-radius:5px;border:2px solid #4c1d95;display:flex;align-items:center;justify-content:center;font-size:9px;color:#c4b5fd;font-weight:700;text-align:center;padding:4px;background:#1e1b4b}
</style>
</head>
<body>
<h1>🎯 Data Analysis Dashboard</h1>
<p>7-Slide PPT — Same dark purple design as your presentation<br/>Click to generate &amp; download the .pptx file</p>

<div class="preview" id="thumbs"></div>

<button class="btn" id="genBtn" onclick="generate()">⬇ Generate &amp; Download PPTX</button>
<div class="status" id="status"></div>

<script>
const slides=[
  "01 / Title",  "02 / Overview", "03 / Key Features",
  "04 / Architecture", "05 / Implementation", "06 / Results",  "07 / Thank You"
];
const thumbs=document.getElementById('thumbs');
slides.forEach((s,i)=>{
  const d=document.createElement('div');
  d.className='slide-thumb';
  d.textContent=s;
  thumbs.appendChild(d);
});

async function generate(){
  const btn=document.getElementById('genBtn');
  const status=document.getElementById('status');
  btn.disabled=true;
  status.textContent='⏳ Building slides...';

  try{
    const pptx=new PptxGenJS();
    pptx.layout='LAYOUT_WIDE';
    pptx.title='AI-Powered Data Analysis Dashboard';

    // ─── COLORS ───
    const BG='0E0C1E', PURPLE='7C3AED', LPURPLE='A78BFA', TEAL='10B981',
          PINK='EC4899', AMBER='F59E0B', WHITE='FFFFFF', GRAY='6B7280',
          CARD='1E1B4B', BORDER='4C1D95', TEXT2='C4B5FD', GREEN='34D399',
          DARK2='1a1730';

    function bg(slide){
      slide.addShape(pptx.ShapeType.rect,{x:0,y:0,w:'100%',h:'100%',fill:{color:BG}});
      // top accent bar
      slide.addShape(pptx.ShapeType.rect,{x:0,y:0,w:'100%',h:0.06,fill:{color:PURPLE}});
      // bottom bar
      slide.addShape(pptx.ShapeType.rect,{x:0,y:7.44,w:'100%',h:0.06,fill:{color:TEAL}});
    }

    function card(slide,x,y,w,h,borderColor=BORDER){
      slide.addShape(pptx.ShapeType.rect,{x,y,w,h,fill:{color:CARD},line:{color:borderColor,width:1.2},rectRadius:0.08});
    }

    function tag(slide,text,x,y,color=PURPLE){
      slide.addShape(pptx.ShapeType.rect,{x,y,w:1.3,h:0.26,fill:{color:color},rectRadius:0.04});
      slide.addText(text,{x,y,w:1.3,h:0.26,fontSize:9,bold:true,color:WHITE,align:'center',valign:'middle'});
    }

    function slideNum(slide,n){
      slide.addText(`0${n} / ${['Introduction','Project Overview','Key Features','Architecture','Implementation','Results','Conclusion'][n-1]}`,
        {x:0.3,y:7.22,w:4,h:0.2,fontSize:8,color:GRAY,align:'left'});
    }

    // ══════════════════════════════════════════
    // SLIDE 1 – TITLE
    // ══════════════════════════════════════════
    {
      const s=pptx.addSlide();
      bg(s);
      // big circle decoration
      s.addShape(pptx.ShapeType.ellipse,{x:7.8,y:-0.8,w:3.5,h:3.5,fill:{color:'1a1045'},line:{color:'2d1f6e',width:1}});
      s.addShape(pptx.ShapeType.ellipse,{x:8.4,y:4.2,w:2.2,h:2.2,fill:{color:'1a1045'},line:{color:'2d1f6e',width:1}});

      // institution
      s.addText('Government Engineering College Vaishali',{x:0.5,y:0.25,w:12,h:0.28,fontSize:11,color:GRAY,align:'center'});

      // title
      s.addText('AI-Powered Data',{x:0.5,y:0.8,w:6.5,h:0.9,fontSize:38,bold:true,color:WHITE});
      s.addText('Analysis Dashboard',{x:0.5,y:1.62,w:6.5,h:0.9,fontSize:38,bold:true,color:LPURPLE});
      // line accent
      s.addShape(pptx.ShapeType.rect,{x:0.5,y:2.56,w:2.8,h:0.05,fill:{color:PINK}});

      s.addText('Smart Insights  •  Data Quality Reports  •  Professional Visualizations',
        {x:0.5,y:2.74,w:6,h:0.28,fontSize:11,color:TEXT2,italic:true});

      // team card
      card(s,0.5,3.1,4.2,3.3);
      s.addText('TEAM MEMBERS',{x:0.7,y:3.2,w:3,h:0.24,fontSize:9,bold:true,color:TEAL,charSpacing:2});
      const team=[
        ['Amarjeet Kumar','CSE (IoT) — 22155135005',PURPLE],
        ['Kartik Raj','CSE (IoT) — 22155135023',PINK],
        ['Shanu Kumar','CSE (IoT) — 22155135026',LPURPLE],
        ['Krishna Murari','CSE (IoT) — 22155125051',AMBER],
      ];
      team.forEach(([name,reg,col],i)=>{
        const y=3.58+i*0.56;
        s.addShape(pptx.ShapeType.ellipse,{x:0.72,y:y+0.04,w:0.22,h:0.22,fill:{color:col}});
        s.addText(name,{x:1.06,y,w:2.2,h:0.22,fontSize:11,bold:true,color:WHITE});
        s.addText(reg,{x:1.06,y:y+0.22,w:2.8,h:0.18,fontSize:8.5,color:TEXT2});
      });

      // mentor card
      card(s,5.1,3.1,4.3,3.3);
      s.addText('UNDER THE GUIDANCE OF',{x:5.3,y:3.2,w:3.8,h:0.22,fontSize:8,bold:true,color:GRAY,charSpacing:2});
      s.addText('MENTOR',{x:5.3,y:3.52,w:3.8,h:0.2,fontSize:8,color:GRAY,charSpacing:1,align:'center'});
      // avatar Z
      s.addShape(pptx.ShapeType.ellipse,{x:6.75,y:3.78,w:0.7,h:0.7,fill:{color:PURPLE}});
      s.addText('Z',{x:6.75,y:3.78,w:0.7,h:0.7,fontSize:18,bold:true,color:WHITE,align:'center',valign:'middle'});
      s.addText('Prof. Uttam Kumar',{x:5.3,y:4.56,w:3.8,h:0.24,fontSize:11,bold:true,color:WHITE,align:'center'});
      s.addText('Department of CSE (IoT)',{x:5.3,y:4.8,w:3.8,h:0.2,fontSize:9,color:TEXT2,align:'center'});
      s.addShape(pptx.ShapeType.rect,{x:5.3,y:5.12,w:3.8,h:0.02,fill:{color:BORDER}});
      s.addText('HEAD OF DEPARTMENT',{x:5.3,y:5.2,w:3.8,h:0.2,fontSize:8,color:GRAY,charSpacing:1,align:'center'});
      s.addShape(pptx.ShapeType.ellipse,{x:6.75,y:5.46,w:0.7,h:0.7,fill:{color:TEAL}});
      s.addText('M',{x:6.75,y:5.46,w:0.7,h:0.7,fontSize:18,bold:true,color:WHITE,align:'center',valign:'middle'});
      s.addText('Prof. Manoj Kumar Sah',{x:5.3,y:6.24,w:3.8,h:0.24,fontSize:11,bold:true,color:WHITE,align:'center'});
      s.addText('Head of Department, CSE',{x:5.3,y:6.48,w:3.8,h:0.2,fontSize:9,color:TEXT2,align:'center'});
      slideNum(s,1);
    }

    // ══════════════════════════════════════════
    // SLIDE 2 – PROJECT OVERVIEW
    // ══════════════════════════════════════════
    {
      const s=pptx.addSlide();
      bg(s);
      s.addText('Project Overview',{x:0.5,y:0.28,w:12,h:0.55,fontSize:28,bold:true,color:WHITE});
      s.addText('What we built and why it matters',{x:0.5,y:0.82,w:12,h:0.26,fontSize:12,color:TEXT2,italic:true});
      s.addShape(pptx.ShapeType.rect,{x:0.5,y:1.12,w:2.5,h:0.04,fill:{color:PINK}});

      // description box
      card(s,0.5,1.32,12,0.82,PURPLE);
      s.addText('An AI-powered, browser-based data analytics platform that processes CSV, Excel, and PDF files to deliver professional-grade insights, data quality reports, and interactive visualizations — all without server infrastructure.',
        {x:0.7,y:1.36,w:11.6,h:0.72,fontSize:11.5,color:WHITE,valign:'middle'});

      // 4 feature boxes
      const feats=[
        ['File Support','CSV • Excel • PDF',PURPLE],
        ['AI Insights','Trend & margin analysis',TEAL],
        ['Quality Report','Duplicates & missing values',PINK],
        ['Visualizations','Bar, Line, Pie, Area charts',AMBER],
      ];
      feats.forEach(([title,sub,col],i)=>{
        const x=0.5+i*3.05;
        s.addShape(pptx.ShapeType.rect,{x,y:2.36,w:2.9,h:0.96,fill:{color:CARD},line:{color:col,width:2},rectRadius:0.08});
        s.addText(title,{x,y:2.42,w:2.9,h:0.32,fontSize:12,bold:true,color:WHITE,align:'center'});
        s.addText(sub,{x,y:2.74,w:2.9,h:0.28,fontSize:9,color:TEXT2,align:'center'});
      });

      // tech stack
      s.addText('TECHNOLOGY STACK',{x:0.5,y:3.52,w:12,h:0.24,fontSize:10,bold:true,color:GRAY,charSpacing:2});
      const techs=['React 18','Recharts','PapaParse','SheetJS','Lodash','Tailwind CSS','Groq API'];
      techs.forEach((t,i)=>{
        const x=0.5+i*1.75;
        if(x+1.65>13) return;
        s.addShape(pptx.ShapeType.rect,{x,y:3.84,w:1.65,h:0.36,fill:{color:DARK2},line:{color:BORDER,width:1},rectRadius:0.04});
        s.addText(t,{x,y:3.84,w:1.65,h:0.36,fontSize:10,color:WHITE,align:'center',valign:'middle'});
      });

      // project description bottom
      card(s,0.5,4.46,12,2.3);
      s.addText('Why This Project Matters',{x:0.7,y:4.56,w:11,h:0.3,fontSize:13,bold:true,color:LPURPLE});
      const pts=[
        '• Enterprise analytics tools (Tableau, Power BI) cost ₹800+/month — inaccessible for SMEs and students.',
        '• Our dashboard is 100% browser-based — zero installation, zero server, zero cost.',
        '• Integrates LLaMA 3.3 70B via Groq API for natural language data querying in real time.',
        '• Designed for non-technical users — upload a CSV and get insights in under 5 seconds.',
      ];
      pts.forEach((pt,i)=>{
        s.addText(pt,{x:0.7,y:4.96+i*0.42,w:11.6,h:0.36,fontSize:10.5,color:WHITE});
      });
      slideNum(s,2);
    }

    // ══════════════════════════════════════════
    // SLIDE 3 – KEY FEATURES
    // ══════════════════════════════════════════
    {
      const s=pptx.addSlide();
      bg(s);
      s.addText('Key Features',{x:0.5,y:0.28,w:12,h:0.55,fontSize:28,bold:true,color:WHITE});
      s.addText('Comprehensive analytics capabilities built into every dashboard',{x:0.5,y:0.82,w:12,h:0.26,fontSize:12,color:TEXT2,italic:true});
      s.addShape(pptx.ShapeType.rect,{x:0.5,y:1.12,w:2.5,h:0.04,fill:{color:TEAL}});

      const features=[
        ['01','Multi-Format File Upload','Accepts CSV, Excel (.xlsx/.xls), and PDF files. Instant parsing with PapaParse, SheetJS, and Mammoth.js.',PURPLE],
        ['02','Smart KPI Dashboard','Auto-detects Sales, Revenue, Profit columns and calculates Total Sales, Avg Order Value, Profit/Loss, and Product counts.',TEAL],
        ['03','Data Quality Report','Identifies duplicate records, missing values per column, and statistical outliers (3σ rule) with actionable alerts.',PINK],
        ['04','AI-Powered Insights','Detects sales trends, highlights top-performing products, calculates profit margin health, and flags underperforming items.',AMBER],
        ['05','Interactive Charts','Time-series Area, horizontal Bar, Region Bar, Pie/Donut, and multi-metric Line charts powered by Recharts.',LPURPLE],
        ['06','Filter & Explore','Column-level search filter with live record count. Top-5 / Bottom-5 performer rankings with color-coded cards.',GREEN],
      ];
      features.forEach(([num,title,desc,col],i)=>{
        const col_=i%2, row_=Math.floor(i/2);
        const x=0.5+col_*6.3, y=1.36+row_*1.8;
        s.addShape(pptx.ShapeType.rect,{x,y,w:6.1,h:1.66,fill:{color:CARD},line:{color:col,width:1.5},rectRadius:0.08});
        s.addShape(pptx.ShapeType.ellipse,{x:x+0.16,y:y+0.2,w:0.44,h:0.44,fill:{color:col}});
        s.addText(num,{x:x+0.16,y:y+0.2,w:0.44,h:0.44,fontSize:10,bold:true,color:WHITE,align:'center',valign:'middle'});
        s.addText(title,{x:x+0.72,y:y+0.2,w:5.2,h:0.3,fontSize:12,bold:true,color:WHITE});
        s.addText(desc,{x:x+0.18,y:y+0.62,w:5.74,h:0.86,fontSize:9.5,color:TEXT2,wrap:true});
      });
      slideNum(s,3);
    }

    // ══════════════════════════════════════════
    // SLIDE 4 – ARCHITECTURE
    // ══════════════════════════════════════════
    {
      const s=pptx.addSlide();
      bg(s);
      s.addText('Architecture & Data Flow',{x:0.5,y:0.28,w:12,h:0.55,fontSize:28,bold:true,color:WHITE});
      s.addText('How the dashboard processes and transforms raw files into actionable insights',{x:0.5,y:0.82,w:12,h:0.26,fontSize:11,color:TEXT2,italic:true});
      s.addShape(pptx.ShapeType.rect,{x:0.5,y:1.12,w:2.5,h:0.04,fill:{color:AMBER}});

      // flow steps
      const steps=[
        ['1','File Upload','CSV / XLSX / PDF',PURPLE],
        ['2','Parse & Extract','PapaParse / SheetJS',PINK],
        ['3','Analyze','Stats & Quality',TEAL],
        ['4','Insights','AI Pattern Detection',AMBER],
        ['5','Visualize','Recharts Rendering',LPURPLE],
      ];
      steps.forEach(([num,title,sub,col],i)=>{
        const x=0.4+i*2.46;
        s.addShape(pptx.ShapeType.rect,{x,y:1.36,w:2.2,h:1.8,fill:{color:CARD},line:{color:col,width:1.8},rectRadius:0.08});
        s.addShape(pptx.ShapeType.ellipse,{x:x+0.72,y:1.54,w:0.76,h:0.76,fill:{color:col}});
        s.addText(num,{x:x+0.72,y:1.54,w:0.76,h:0.76,fontSize:18,bold:true,color:WHITE,align:'center',valign:'middle'});
        s.addText(title,{x,y:2.44,w:2.2,h:0.28,fontSize:11,bold:true,color:WHITE,align:'center'});
        s.addText(sub,{x,y:2.72,w:2.2,h:0.28,fontSize:9,color:TEXT2,align:'center'});
        if(i<4){
          s.addShape(pptx.ShapeType.rect,{x:x+2.22,y:2.18,w:0.22,h:0.06,fill:{color:GRAY}});
        }
      });

      // output modules
      s.addText('OUTPUT MODULES',{x:0.5,y:3.38,w:12,h:0.24,fontSize:9,bold:true,color:TEAL,charSpacing:3});
      const mods=[
        ['KPI Cards','Sales, Profit, Orders, Products',TEAL],
        ['Alert Panel','Duplicates, low performance flags',PINK],
        ['Top/Bottom 5','Ranked product performers',AMBER],
        ['Chart Suite','5 chart types, interactive',PURPLE],
        ['Statistical Table','Mean, Max, Min, Total per column',LPURPLE],
      ];
      mods.forEach(([title,sub,col],i)=>{
        const x=0.4+i*2.46;
        s.addShape(pptx.ShapeType.rect,{x,y:3.72,w:2.2,h:1.28,fill:{color:CARD},line:{color:col,width:1.2},rectRadius:0.08});
        s.addText(title,{x,y:3.82,w:2.2,h:0.28,fontSize:10.5,bold:true,color:WHITE,align:'center'});
        s.addShape(pptx.ShapeType.rect,{x:x+0.4,y:4.12,w:1.4,h:0.02,fill:{color:col}});
        s.addText(sub,{x,y:4.24,w:2.2,h:0.56,fontSize:8.5,color:TEXT2,align:'center',wrap:true});
      });
      slideNum(s,4);
    }

    // ══════════════════════════════════════════
    // SLIDE 5 – IMPLEMENTATION
    // ══════════════════════════════════════════
    {
      const s=pptx.addSlide();
      bg(s);
      s.addText('Implementation Highlights',{x:0.5,y:0.28,w:12,h:0.55,fontSize:28,bold:true,color:WHITE});
      s.addShape(pptx.ShapeType.rect,{x:0.5,y:0.86,w:2.5,h:0.04,fill:{color:PINK}});

      // left highlights
      const highs=[
        ['Outlier Detection (3σ Rule)',
         'For each numeric column, calculates mean and standard deviation. Values exceeding mean + 3σ are flagged as statistical outliers.',PURPLE],
        ['Dynamic Column Recognition',
         'Auto-detects Sales, Revenue, Profit, Product, Region, and Date columns using case-insensitive substring matching — works across datasets.',TEAL],
        ['Top/Bottom Performer Ranking',
         'Groups rows by product using Lodash groupBy, sums sales per product, then sorts descending to extract top-5 and bottom-5 rankings.',PINK],
        ['Responsive Design',
         'Fully mobile-responsive layout using Tailwind CSS breakpoints. Cards, charts, and tables adapt from 320px to 1920px width.',AMBER],
      ];
      highs.forEach(([title,desc,col],i)=>{
        const y=1.06+i*1.48;
        s.addShape(pptx.ShapeType.rect,{x:0.4,y,w:7.1,h:1.34,fill:{color:CARD},line:{color:col,width:2},rectRadius:0.06});
        s.addText(title,{x:0.6,y:y+0.12,w:6.8,h:0.28,fontSize:11,bold:true,color:WHITE});
        s.addText(desc,{x:0.6,y:y+0.46,w:6.8,h:0.74,fontSize:9.5,color:TEXT2,wrap:true});
      });

      // project stats
      card(s,7.8,1.06,4.8,5.9);
      s.addText('PROJECT STATS',{x:7.8,y:1.18,w:4.8,h:0.24,fontSize:9,bold:true,color:TEAL,align:'center',charSpacing:2});
      const stats=[
        ['500+','Lines of React Code',PURPLE],
        ['6','Chart Types',TEAL],
        ['3','File Formats Supported',PINK],
        ['10+','KPI Metrics Generated',AMBER],
        ['3σ','Outlier Detection',LPURPLE],
        ['100%','Client-Side Processing',GREEN],
      ];
      stats.forEach(([val,label,col],i)=>{
        const y=1.56+i*0.88;
        s.addShape(pptx.ShapeType.rect,{x:8,y,w:4.4,h:0.72,fill:{color:BG},line:{color:col,width:1},rectRadius:0.05});
        s.addText(val,{x:8.1,y,w:1.2,h:0.72,fontSize:20,bold:true,color:col,align:'center',valign:'middle'});
        s.addText(label,{x:9.4,y,w:2.9,h:0.72,fontSize:10,color:WHITE,valign:'middle'});
      });
      slideNum(s,5);
    }

    // ══════════════════════════════════════════
    // SLIDE 6 – RESULTS
    // ══════════════════════════════════════════
    {
      const s=pptx.addSlide();
      bg(s);
      s.addText('Results & Conclusion',{x:0.5,y:0.28,w:12,h:0.55,fontSize:28,bold:true,color:WHITE});
      s.addShape(pptx.ShapeType.rect,{x:0.5,y:0.86,w:2.5,h:0.04,fill:{color:GREEN}});

      // outcomes
      card(s,0.4,1.06,6.2,5.9,TEAL);
      s.addText('PROJECT OUTCOMES',{x:0.6,y:1.18,w:5.8,h:0.26,fontSize:9,bold:true,color:TEAL,charSpacing:2});
      const outcomes=[
        'Fully functional browser-based analytics dashboard',
        'Zero backend — complete client-side data processing',
        'Automatic profit/loss trend detection with alerts',
        'Data quality scoring for real-world messy datasets',
        'Professional-grade charts comparable to Power BI',
        'Deployed & accessible via Vercel (Amarjeet\'s portfolio)',
      ];
      outcomes.forEach((o,i)=>{
        const y=1.58+i*0.74;
        s.addShape(pptx.ShapeType.ellipse,{x:0.6,y:y+0.08,w:0.22,h:0.22,fill:{color:TEAL}});
        s.addText(o,{x:0.96,y,w:5.5,h:0.58,fontSize:10.5,color:WHITE,wrap:true});
      });

      // future scope
      card(s,6.9,1.06,6,5.9,PINK);
      s.addText('FUTURE SCOPE',{x:7.1,y:1.18,w:5.6,h:0.26,fontSize:9,bold:true,color:PINK,charSpacing:2});
      const future=[
        'Google Sheets / Drive integration',
        'Natural language query (ask data)',
        'Real-time collaborative dashboards',
        'Export to PDF / Excel reports',
        'ML-based forecasting module',
        'Dark / light theme toggle',
        'IoT sensor data stream support',
      ];
      future.forEach((f,i)=>{
        const y=1.58+i*0.72;
        s.addShape(pptx.ShapeType.ellipse,{x:7.1,y:y+0.08,w:0.22,h:0.22,fill:{color:PINK}});
        s.addText(f,{x:7.44,y,w:5.3,h:0.58,fontSize:10.5,color:WHITE,wrap:true});
      });
      slideNum(s,6);
    }

    // ══════════════════════════════════════════
    // SLIDE 7 – THANK YOU
    // ══════════════════════════════════════════
    {
      const s=pptx.addSlide();
      bg(s);
      // big purple block
      s.addShape(pptx.ShapeType.rect,{x:0,y:1.6,w:'100%',h:4.4,fill:{color:'2d1b69'}});
